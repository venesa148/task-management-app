<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fcff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#102033">Task Management ERD</text>
  <text x="600" y="104" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#65758b">users memiliki banyak tasks melalui assignee_id</text>

  <rect x="120" y="180" rx="20" ry="20" width="380" height="320" fill="url(#card)" stroke="#d9e3ee" filter="url(#shadow)"/>
  <rect x="700" y="180" rx="20" ry="20" width="380" height="320" fill="url(#card)" stroke="#d9e3ee" filter="url(#shadow)"/>

  <rect x="120" y="180" rx="20" ry="20" width="380" height="64" fill="#0f766e"/>
  <rect x="700" y="180" rx="20" ry="20" width="380" height="64" fill="#f97316"/>

  <text x="310" y="221" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">users</text>
  <text x="890" y="221" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">tasks</text>

  <text x="155" y="275" font-family="Consolas, monospace" font-size="18" fill="#102033">PK  id</text>
  <text x="155" y="312" font-family="Consolas, monospace" font-size="18" fill="#102033">name</text>
  <text x="155" y="349" font-family="Consolas, monospace" font-size="18" fill="#102033">username</text>
  <text x="155" y="386" font-family="Consolas, monospace" font-size="18" fill="#102033">password</text>

  <text x="735" y="275" font-family="Consolas, monospace" font-size="18" fill="#102033">PK  id</text>
  <text x="735" y="312" font-family="Consolas, monospace" font-size="18" fill="#102033">title</text>
  <text x="735" y="349" font-family="Consolas, monospace" font-size="18" fill="#102033">description</text>
  <text x="735" y="386" font-family="Consolas, monospace" font-size="18" fill="#102033">status</text>
  <text x="735" y="423" font-family="Consolas, monospace" font-size="18" fill="#102033">deadline</text>
  <text x="735" y="460" font-family="Consolas, monospace" font-size="18" fill="#102033">FK  assignee_id</text>

  <line x1="500" y1="340" x2="700" y2="340" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="500" cy="340" r="10" fill="#0f766e"/>
  <text x="600" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#65758b">1</text>
  <text x="645" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#65758b">many</text>

  <rect x="330" y="560" rx="16" ry="16" width="540" height="88" fill="#ffffff" stroke="#d9e3ee" filter="url(#shadow)"/>
  <text x="600" y="598" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#102033">Relasi</text>
  <text x="600" y="626" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#65758b">Satu user dapat memiliki banyak task. Setiap task hanya punya satu assignee.</text>
</svg>